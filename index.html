<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Stickblade Arena</title>
    <link rel="stylesheet" href="style.css"> <!-- This links to the css file -->
</head>
<body>
    <div id="title-screen">
        <div id="title-screen_title_wrapper">
            <h1 id="title-screen_title">Stickblade Arena</h1>
        </div>
        <div id="title-screen_buttons_wrapper">
            <button class = "title-screen_buttons" id="options-button">Options</button>
            <button class = "title-screen_buttons" id="start-button">Start Game</button>
            <button class = "title-screen_buttons" id="credits-button">Credits</button>
        </div>
    </div>

    <div id="credits-screen" class="snap-out">
        <h1 id="credits-screen_title">Credits:</h1>
        <p id="credits-screen_text">Game developed by GaddeYak, continue credits...</p>
        <button id="credits-screen_back-button">Back to Title Screen</button>
    </div>

    <div id="options-screen" class="snap-out">
        <h1 id="options-screen_title">Options:</h1>
        <p id="options-screen_text">Options coming soon...</p>
        <button id="options-screen_back-button">Back to Title Screen</button>
    </div>

    <script src="main.js" type="module"></script> <!-- This links to the JavaScript file -->
</body>
</html>
